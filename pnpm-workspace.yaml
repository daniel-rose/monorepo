packages:
  - 'examples/*'
  - 'packages/*'
  - 'configs/*'
overrides:
  '@daniel-rose/envex': 'workspace:^'
  '@daniel-rose/eslint-config': 'workspace:^'
  '@daniel-rose/prettier-config': 'workspace:^'
  '@daniel-rose/semantic-release-config': 'workspace:^'
allowBuilds:
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
ignoreWorkspaceRootCheck: true
shellEmulator: true
workspacesUpdate: false
storeDir: ${PNPM_HOME}/store
preferWorkspacePackages: true
linkWorkspacePackages: true
autoInstallPeers: true
minimumReleaseAgeExclude:
  - '@microsoft/api-extractor-model@7.33.10'
  - '@microsoft/api-extractor@7.58.11'
  - '@rushstack/node-core-library@5.23.3'
  - '@rushstack/terminal@0.24.2'
  - '@rushstack/ts-command-line@5.3.12'
