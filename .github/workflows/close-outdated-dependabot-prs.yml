name: Close outdated Dependabot PRs

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  close-outdated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Close conflicting or superseded Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "dependencies" \
            --json number,author,headRefName,mergeable \
            --jq '.[] | select(.author.login | test("dependabot")) | "\(.number) \(.mergeable) \(.headRefName)"' \
          | while read -r num mergeable branch; do
            # Close PRs with merge conflicts
            if [ "$mergeable" = "CONFLICTING" ]; then
              gh pr close "$num" \
                --repo "${{ github.repository }}" \
                --delete-branch \
                --comment "Closed automatically — this PR has merge conflicts. Dependabot will open a new PR."
              continue
            fi

            # Only check npm/yarn PRs for superseded versions
            case "$branch" in
              dependabot/npm_and_yarn/*) ;;
              *) continue ;;
            esac

            # Close PRs where the bumped version is already superseded
            # Strip dependabot prefix and known workspace directories
            path="${branch#dependabot/npm_and_yarn/}"
            path=$(echo "$path" | sed 's|^packages/[^/]*/||; s|^examples/[^/]*/||; s|^configs/[^/]*/||')

            # Handle scoped packages (scope/name-version → @scope/name)
            if echo "$path" | grep -q '/'; then
              scope=$(echo "$path" | cut -d'/' -f1)
              rest=$(echo "$path" | cut -d'/' -f2-)
              package="@${scope}/$(echo "$rest" | sed -n 's|\(.*\)-[0-9].*|\1|p')"
              pr_version=$(echo "$rest" | sed -n 's|.*-\([0-9].*\)|\1|p')
            else
              package=$(echo "$path" | sed -n 's|\(.*\)-[0-9].*|\1|p')
              pr_version=$(echo "$path" | sed -n 's|.*-\([0-9].*\)|\1|p')
            fi

            if [ -z "$package" ] || [ -z "$pr_version" ]; then
              continue
            fi

            # Find the highest installed version across all package.json files (exclude build artifacts)
            current_version=$(grep -r "\"$package\"" --include="package.json" . \
              | grep -v node_modules | grep -v .next \
              | sed -n 's/.*"\^*~*\([0-9][0-9.]*[0-9]\)".*/\1/p' \
              | sort -V | tail -1)

            if [ -n "$current_version" ]; then
              if [ "$(printf '%s\n' "$pr_version" "$current_version" | sort -V | tail -1)" = "$current_version" ]; then
                gh pr close "$num" \
                  --repo "${{ github.repository }}" \
                  --delete-branch \
                  --comment "Closed automatically — already on $package@$current_version which supersedes the proposed $pr_version."
              fi
            fi
          done
