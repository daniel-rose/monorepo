name: Close outdated Dependabot PRs

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  close-outdated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Close conflicting or superseded Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "dependencies" \
            --json number,author,headRefName,mergeable \
            --jq '.[] | select(.author.login == "dependabot[bot]") | "\(.number) \(.mergeable) \(.headRefName)"' \
          | while read -r num mergeable branch; do
            # Close PRs with merge conflicts
            if [ "$mergeable" = "CONFLICTING" ]; then
              gh pr close "$num" \
                --repo "${{ github.repository }}" \
                --delete-branch \
                --comment "Closed automatically — this PR has merge conflicts. Dependabot will open a new PR."
              continue
            fi

            # Close PRs where the bumped version is already superseded
            # Dependabot branch: dependabot/npm_and_yarn/[path/]PACKAGE-VERSION
            # Extract last segment (PACKAGE-VERSION) after stripping optional directory prefix
            slug="${branch##*/}"
            package=$(echo "$slug" | sed -n 's|\(.*\)-[0-9].*|\1|p')
            pr_version=$(echo "$slug" | sed -n 's|.*-\([0-9].*\)|\1|p')

            if [ -z "$package" ] || [ -z "$pr_version" ]; then
              continue
            fi

            # Check if any package.json already has a higher or equal version
            current_version=$(grep -r "\"$package\"" --include="package.json" -l . | grep -v node_modules | head -1 | xargs grep "\"$package\"" | sed -n 's/.*"\^*~*\([0-9][0-9.]*\)".*/\1/p')

            if [ -n "$current_version" ]; then
              if [ "$(printf '%s\n' "$pr_version" "$current_version" | sort -V | tail -1)" = "$current_version" ] && [ "$pr_version" != "$current_version" ]; then
                gh pr close "$num" \
                  --repo "${{ github.repository }}" \
                  --delete-branch \
                  --comment "Closed automatically — already on $package@$current_version which supersedes the proposed $pr_version."
              fi
            fi
          done
